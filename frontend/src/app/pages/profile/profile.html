<div class="w-full min-h-screen bg-[#FDF9F0] pb-[100px] md:pb-16 font-sans">
  
  <!-- Blue Hero Header -->
  <div class="bg-angeles-blue text-white rounded-b-[48px] md:rounded-[40px] pt-16 md:pt-20 pb-16 md:pb-20 px-8 relative overflow-hidden shadow-2xl md:mt-6 md:max-w-[1440px] md:mx-auto lg:mx-12 xl:mx-auto">
    <!-- Decorative background elements -->
    <div class="absolute top-[-10%] right-[-5%] w-48 h-48 bg-white/10 rounded-full blur-2xl"></div>
    <div class="absolute bottom-[-20%] left-[20%] w-64 h-64 bg-black/10 rounded-full blur-3xl"></div>

    <div class="relative z-10 md:max-w-2xl md:mx-auto">
      <div class="flex justify-between items-center mb-8 md:mb-10">
        <h1 class="font-serif text-[32px] md:text-4xl font-bold tracking-tight drop-shadow-sm">Profile</h1>
        <button class="p-2 hover:bg-white/10 rounded-full transition-colors active:scale-95">
          <lucide-icon name="settings" class="w-6 h-6 text-white/90"></lucide-icon>
        </button>
      </div>

      <div class="flex items-center gap-5 md:gap-6">
        <!-- Avatar Block -->
        <div class="w-20 h-20 md:w-24 md:h-24 bg-angeles-yellow rounded-2xl md:rounded-3xl flex items-center justify-center font-serif text-[28px] md:text-3xl font-bold text-angeles-blue shadow-lg relative transform transition-transform hover:scale-105">
           MR
           <!-- Online / Verification indicator -->
           <div class="absolute -bottom-1 -right-1 w-5 h-5 bg-green-500 border-2 border-angeles-blue rounded-full"></div>
        </div>
        
        <!-- User Info -->
        <div>
          <h2 class="text-2xl md:text-[28px] font-bold mb-0.5 md:mb-1">Maria Reyes</h2>
          <p class="text-white/80 text-[14px] md:text-base mb-2 md:mb-3 font-medium">Local Explorer since 2024</p>
          <div class="flex items-center gap-1.5 text-[12px] md:text-sm font-bold bg-white/10 backdrop-blur-md px-3 py-1.5 rounded-full inline-flex border border-white/10">
            <lucide-icon name="star" class="w-3.5 h-3.5 text-angeles-yellow fill-angeles-yellow"></lucide-icon>
            Community Contributor
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Content Container -->
  <div class="px-6 md:px-8 -mt-8 md:-mt-10 relative z-20 max-w-2xl mx-auto space-y-4 md:space-y-6">
    
    <!-- Stats Card -->
    <div class="bg-white rounded-[28px] shadow-lg shadow-blue-900/5 p-6 md:p-8 flex justify-between items-center border border-gray-100/50 hover:shadow-xl transition-shadow">
      <div class="text-center flex-1">
        <div class="text-2xl md:text-3xl font-bold text-angeles-blue mb-1">23</div>
        <div class="text-[12px] md:text-[14px] text-gray-500 font-medium">Visited</div>
      </div>
      <div class="w-px h-10 bg-gray-200"></div>
      <div class="text-center flex-1">
        <div class="text-2xl md:text-3xl font-bold text-angeles-blue mb-1">15</div>
        <div class="text-[12px] md:text-[14px] text-gray-500 font-medium">Saved</div>
      </div>
      <div class="w-px h-10 bg-gray-200"></div>
      <div class="text-center flex-1">
        <div class="text-2xl md:text-3xl font-bold text-angeles-blue mb-1">8</div>
        <div class="text-[12px] md:text-[14px] text-gray-500 font-medium">Reviews</div>
      </div>
    </div>

    <!-- Action Links -->
    <button class="w-full bg-white rounded-[24px] shadow-sm hover:shadow-md p-5 md:p-6 flex items-center justify-between border border-gray-100 group transition-all">
      <div class="flex items-center gap-4">
        <div class="bg-red-50 p-3 rounded-2xl group-hover:scale-110 transition-transform">
          <lucide-icon name="heart" class="w-5 h-5 text-angeles-red"></lucide-icon>
        </div>
        <span class="font-bold text-[16px] md:text-lg text-gray-800">Favorites</span>
      </div>
      <lucide-icon name="chevron-right" class="w-5 h-5 text-gray-400 group-hover:text-angeles-blue transition-colors group-hover:translate-x-1 transform"></lucide-icon>
    </button>

    <button class="w-full bg-white rounded-[24px] shadow-sm hover:shadow-md p-5 md:p-6 flex items-center justify-between border border-gray-100 group transition-all">
      <div class="flex items-center gap-4">
        <div class="bg-blue-50 p-3 rounded-2xl group-hover:scale-110 transition-transform">
          <lucide-icon name="bookmark" class="w-5 h-5 text-angeles-blue"></lucide-icon>
        </div>
        <span class="font-bold text-[16px] md:text-lg text-gray-800">Saved Places</span>
      </div>
      <lucide-icon name="chevron-right" class="w-5 h-5 text-gray-400 group-hover:text-angeles-blue transition-colors group-hover:translate-x-1 transform"></lucide-icon>
    </button>

    <button class="w-full bg-white rounded-[24px] shadow-sm hover:shadow-md p-5 md:p-6 flex items-center justify-between border border-gray-100 group transition-all">
      <div class="flex items-center gap-4">
        <div class="bg-yellow-50 p-3 rounded-2xl group-hover:scale-110 transition-transform">
          <lucide-icon name="map-pin" class="w-5 h-5 text-angeles-yellow"></lucide-icon>
        </div>
        <span class="font-bold text-[16px] md:text-lg text-gray-800">My Submissions</span>
      </div>
      <lucide-icon name="chevron-right" class="w-5 h-5 text-gray-400 group-hover:text-angeles-blue transition-colors group-hover:translate-x-1 transform"></lucide-icon>
    </button>

    <!-- Sign Out -->
    <div class="pt-6 md:pt-10 flex justify-center pb-4">
      <button class="flex items-center gap-2 text-gray-400 hover:text-angeles-red font-bold text-[15px] md:text-base transition-colors group">
        <lucide-icon name="log-out" class="w-5 h-5 group-hover:-translate-x-1 transition-transform"></lucide-icon>
        Sign Out
      </button>
    </div>

  </div>
</div>
